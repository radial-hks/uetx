version: 2
builds:
  - main: ./cmd/uetx
    binary: uetx
    ldflags:
      - -s -w
      - -X github.com/radial/uetx/internal/version.Version={{.Version}}
      - -X github.com/radial/uetx/internal/version.Commit={{.ShortCommit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
